name: Publish

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  # Pure-Python wheel + sdist (hatchling). No native build matrix needed.
  build:
    name: Build wheel + sdist
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Build wheel + sdist
        run: uv build

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*
          retention-days: 15

  # Trusted Publishing (OIDC) to PyPI on every v* tag — stable and pre-release
  # alike, so the 0.1.0a1 alpha lands on real PyPI alongside the core packages.
  publish-pypi:
    name: Publish to PyPI
    needs: build
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest
    environment: release
    permissions:
      id-token: write

    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Publish to PyPI
        run: uv publish dist/*

  # Manual smoke-test channel: dispatch without a tag publishes to TestPyPI.
  publish-testpypi:
    name: Publish to TestPyPI
    needs: build
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: prerelease
    permissions:
      id-token: write

    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Publish to TestPyPI
        run: uv publish --publish-url https://test.pypi.org/legacy/ dist/*
